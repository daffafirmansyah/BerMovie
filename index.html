<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BerMovie</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0b0b12;--card:#13131e;--text:#ececf0;--dim:#6a6a7e;--accent:#f97316;--glow:rgba(249,115,22,.25);--rad:10px}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;overflow-x:hidden}
body{background-image:radial-gradient(ellipse at 20% 50%,rgba(249,115,22,.03)0%,transparent 60%),radial-gradient(ellipse at 80% 50%,rgba(249,115,22,.02)0%,transparent 60%)}

/* TOP BAR — hidden, appears on hover */
.top-bar{position:fixed;top:0;left:0;right:0;height:56px;z-index:50;display:flex;align-items:center;gap:16px;padding:0 24px;background:linear-gradient(180deg,rgba(11,11,18,.95)0%,transparent);opacity:0;transition:opacity .35s;pointer-events:none}
.top-bar.visible{opacity:1;pointer-events:auto}
.top-bar .brand{font-weight:600;font-size:1rem;letter-spacing:2px;text-transform:uppercase}
.top-bar .brand span{color:var(--accent)}
.top-bar .spacer{flex:1}
.top-bar .hint{font-size:.75rem;color:var(--dim);display:flex;align-items:center;gap:6px}
.top-bar .hint kbd{padding:2px 6px;border-radius:4px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);font-size:.7rem}
#searchInput{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);border-radius:8px;padding:8px 14px;color:var(--text);font-size:.85rem;width:220px;outline:none;transition:all .25s}
#searchInput:focus{border-color:var(--accent);width:300px;background:rgba(255,255,255,.08)}
#searchInput::placeholder{color:var(--dim)}

/* GRID */
.grid-wrap{position:relative;z-index:1}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;padding:16px;max-width:1600px;margin:0 auto}
.card{aspect-ratio:2/3;border-radius:var(--rad);overflow:hidden;cursor:pointer;position:relative;background:var(--card);transition:transform .35s cubic-bezier(.22,1,.36,1),box-shadow .35s;will-change:transform;border:1px solid rgba(255,255,255,.04)}
.card img{width:100%;height:100%;object-fit:cover;display:block;transition:opacity .4s}
.card .title-overlay{position:absolute;bottom:0;left:0;right:0;padding:40px 14px 12px;background:linear-gradient(transparent,rgba(0,0,0,.85));opacity:0;transform:translateY(6px);transition:all .3s}
.card:hover .title-overlay{opacity:1;transform:translateY(0)}
.card .title-overlay .nm{font-size:.85rem;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card .title-overlay .yr{font-size:.7rem;color:var(--dim);margin-top:1px}
.card .player-wrap{position:absolute;inset:0;z-index:5;display:none;background:#000}
.card .player-wrap.active{display:block}
.card .player-wrap iframe{width:100%;height:100%;border:none}
.card .player-wrap .close-card{position:absolute;top:6px;right:6px;width:26px;height:26px;border-radius:50%;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:6;opacity:0;transition:opacity .3s}
.card .player-wrap:hover .close-card,.card .player-wrap.active .close-card{opacity:1}
.card.playing{transform:scale(1.08);z-index:10;box-shadow:0 20px 80px rgba(0,0,0,.6);border-color:rgba(249,115,22,.3)}
.card.playing img{opacity:0}
.card.playing .title-overlay{opacity:0!important}

/* LOADER */
.loader{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center}
.loader.active{display:flex}
.loader .count{font-size:6rem;font-weight:700;color:var(--accent);line-height:1;text-shadow:0 0 40px var(--glow)}
.loader .label{font-size:.7rem;color:var(--dim);margin-top:8px;letter-spacing:5px;text-transform:uppercase}

/* TRAILER PIP */
.pip{position:fixed;bottom:20px;right:20px;width:320px;height:180px;z-index:100;border-radius:10px;overflow:hidden;display:none;box-shadow:0 10px 40px rgba(0,0,0,.6);border:1px solid rgba(255,255,255,.08)}
.pip.active{display:block}
.pip iframe{width:100%;height:100%;border:none}
.pip .close-pip{position:absolute;top:4px;right:4px;width:22px;height:22px;border-radius:50%;background:rgba(0,0,0,.7);border:none;color:#fff;font-size:.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;z-index:6}

/* SCROLLBAR */
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.06);border-radius:3px}

@media(max-width:768px){
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;padding:8px}
  .top-bar{padding:0 12px;height:48px}
  #searchInput{width:140px;font-size:.8rem}
  #searchInput:focus{width:180px}
  .pip{width:200px;height:112px;bottom:10px;right:10px}
  .card.playing{transform:scale(1.04)}
}
</style>
</head>
<body>

<div class="top-bar" id="topBar">
  <div class="brand">Ber<span>Movie</span></div>
  <div class="spacer"></div>
  <input id="searchInput" placeholder="Cari film..." autocomplete="off">
  <div class="hint"><kbd>/</kbd> <span>cari</span></div>
</div>

<div class="grid-wrap">
  <div class="grid" id="grid"></div>
</div>

<div class="loader" id="loader">
  <div class="count" id="loaderCount">3</div>
  <div class="label">Loading</div>
</div>

<div class="pip" id="pip">
  <iframe id="pipIframe" allow="autoplay; fullscreen" allowfullscreen></iframe>
  <button class="close-pip" id="pipClose">✕</button>
</div>

<script>
const KEY='245f8c4922de78b5017c149fbfa89ab5';
const IMG='https://image.tmdb.org/t/p';
const API='https://api.themoviedb.org/3';
let items=[];
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const tmdb=e=>fetch(`${API}${e}${e.includes('?')?'&':'?'}api_key=${KEY}`).then(r=>r.json());

async function loadGrid(){
  const[t,m]=await Promise.all([tmdb('/trending/all/day'),tmdb('/movie/popular')]);
  const seen=new Set();
  items=[...(t.results||[]),...(m.results||[])].filter(x=>{
    if(seen.has(x.id))return false;
    seen.add(x.id);return true;
  }).slice(0,60);
  renderGrid(items);
}

function renderGrid(list){
  const g=$('#grid');
  g.innerHTML=list.map((x,i)=>{
    const p=x.poster_path?`${IMG}/w500${x.poster_path}`:'';
    const t=x.title||x.name||'';
    const y=(x.release_date||x.first_air_date||'').slice(0,4);
    return `<div class="card" data-i="${i}" data-id="${x.id}" data-tt="${x.title?'movie':'tv'}">
      ${p?`<img src="${p}" alt="${t}" loading="lazy">`:`<div style="height:100%;display:flex;align-items:center;justify-content:center;color:var(--dim);font-size:.75rem">No Poster</div>`}
      <div class="title-overlay"><div class="nm">${t}</div><div class="yr">${y}</div></div>
      <div class="player-wrap"><button class="close-card">✕</button></div>
    </div>`;
  }).join('');
}

// Click card → play in-place
$('#grid').addEventListener('click',async e=>{
  const card=e.target.closest('.card');
  if(!card||e.target.closest('.close-card'))return;
  const i=parseInt(card.dataset.i);
  const x=items[i];
  if(!x)return;

  // Close other playing cards
  $$('.card.playing').forEach(c=>{
    if(c!==card)stopCard(c);
  });

  // If already playing this card, stop
  if(card.classList.contains('playing')){stopCard(card);return;}

  // Loader
  const ld=$('#loader');
  ld.classList.add('active');
  const ct=$('#loaderCount');
  for(let n=3;n>=1;n--){ct.textContent=n;await new Promise(r=>setTimeout(r,400));}

  // Fetch embed
  const type=x.title?'movie':'tv';
  const epNum=1;let embedUrl='';
  if(type==='tv'){
    const d=await tmdb(`/tv/${x.id}?append_to_response=videos`);
    const s=d.seasons?.filter(s=>s.season_number>0).pop();
    const sn=s?.season_number||1;
    embedUrl=`https://vidsrcme.ru/embed/tv?tmdb=${x.id}&season=${sn}&episode=1`;
  }else{
    embedUrl=`https://vidsrcme.ru/embed/movie?tmdb=${x.id}`;
  }

  ld.classList.remove('active');

  // Setup player in card
  const pw=card.querySelector('.player-wrap');
  pw.innerHTML='<button class="close-card">✕</button>';
  const f=document.createElement('iframe');
  f.src=embedUrl;
  f.setAttribute('allow','autoplay; fullscreen');
  f.setAttribute('allowfullscreen','true');
  pw.prepend(f);
  pw.classList.add('active');
  card.classList.add('playing');
  card.scrollIntoView({behavior:'smooth',block:'center'});

  // Trailer PiP
  const v=await tmdb(`/${type}/${x.id}/videos`);
  const tr=(v.results||[]).find(v=>v.type==='Trailer'&&v.site==='YouTube');
  if(tr){
    const pip=$('#pip');
    pip.classList.add('active');
    $('#pipIframe').src=`https://www.youtube.com/embed/${tr.key}?autoplay=1&rel=0`;
    $('#pipClose').onclick=()=>{pip.classList.remove('active');$('#pipIframe').src='';};
  }
});

function stopCard(card){
  card.classList.remove('playing');
  const pw=card.querySelector('.player-wrap');
  if(pw){pw.classList.remove('active');pw.innerHTML='<button class="close-card">✕</button>';}
}

// Close player via X button
$('#grid').addEventListener('click',e=>{
  const btn=e.target.closest('.close-card');
  if(!btn)return;
  const card=btn.closest('.card');
  if(card)stopCard(card);
  $('#pip').classList.remove('active');
  $('#pipIframe').src='';
});

// Top bar on hover
let tbTimer;
document.addEventListener('mousemove',e=>{
  if(e.clientY<60){$('#topBar').classList.add('visible');clearTimeout(tbTimer)}
  else{tbTimer=setTimeout(()=>$('#topBar').classList.remove('visible'),2000)}
});
$('#topBar').addEventListener('mouseenter',()=>{$('#topBar').classList.add('visible')});
$('#topBar').addEventListener('mouseleave',()=>{tbTimer=setTimeout(()=>$('#topBar').classList.remove('visible'),1000)});

// Command search
$('#searchInput').addEventListener('input',async function(){
  const q=this.value.trim();
  if(!q){renderGrid(items);return;}
  const d=await tmdb(`/search/multi?query=${encodeURIComponent(q)}`);
  const r=(d.results||[]).filter(x=>x.media_type==='movie'||x.media_type==='tv').slice(0,20);
  renderGrid(r);
});

// Keyboard shortcuts
document.addEventListener('keydown',e=>{
  if(e.key==='/'&&e.target.tagName!=='INPUT'){e.preventDefault();$('#searchInput').focus();}
  if(e.key==='Escape'){
    $('#searchInput').blur();
    const playing=$$('.card.playing');
    if(playing.length){stopCard(playing[0]);$('#pip').classList.remove('active');$('#pipIframe').src='';}
  }
});

// Init
loadGrid();
</script>
</body>
</html>
